import org.springframework.boot.gradle.plugin.SpringBootPlugin

plugins {
    id 'java'
    id 'org.springframework.boot' version '4.0.0'
}

group = 'com.example'
version = '0.0.1-SNAPSHOT'

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

repositories {
    mavenCentral()
}

// Spring Boot 4 ships its own dependency management via the plugin BOM.
// The io.spring.dependency-management plugin is no longer required.
dependencies {
    implementation platform(SpringBootPlugin.BOM_COORDINATES)

    implementation 'org.springframework.boot:spring-boot-starter-webmvc'

    // Bean Validation (JSR-380)
    implementation 'org.springframework.boot:spring-boot-starter-validation'

    // Tests — spring-boot-starter-webmvc-test is required in Spring Boot 4 for
    // @AutoConfigureMockMvc, which moved out of the monolithic test-autoconfigure jar
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.boot:spring-boot-starter-webmvc-test'
}

tasks.withType(Test) {
    useJUnitPlatform()
}
